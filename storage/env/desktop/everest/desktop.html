<!DOCTYPE html>
<html lang="en">
    <head>
        <!-- <base href="env/desktop/everest/"> -->
        
        <!-- MAIN SCRIPT -->
        <script type="module" src="./assets/main.js"></script>

        <!-- CSS -->
        <link rel="stylesheet" href="./assets/style/desktop.css">
        <link rel="stylesheet" href="./assets/desktop/wallpaper/wallpaper.css">
        <link rel="stylesheet" href="./assets/taskbar/taskbar.css">
    </head>

    <body style="overflow: hidden;">

        <div id="_loading" style="animation-name: _loading__show;">
            <img src="./assets/icons/loading.svg" draggable="false">
        </div>
        
        <div id="desktop">
            <div id="wallpaper">
                <img src="" draggable="false">
            </div>
        </div>

        <div id="taskbar">
            <button id="launcher">
                <img src="/system/assets/icon/icon.png" draggable="false">
            </button>

            <div id="programs"></div>

            <div id="tray">
                <div id="utils">

                </div>

                <div id="clock">
                    <span id="time"></span>
                    <span id="date"></span>
                </div>
            </div>
        </div>

    </body>
</html>
